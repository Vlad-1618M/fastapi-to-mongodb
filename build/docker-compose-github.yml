version: '3.8'

services:
  resume-mongo:
    build:
      context: ..
      dockerfile: build/mongodb.Dockerfile
    container_name: resume-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ADMIN_USER}       # MongoDB root username
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ADMIN_PASS}       # MongoDB root password
      MONGO_USER: ${MONGO_USER}                             # MongoDB application user
      MONGO_PASS: ${MONGO_PASS}                             # MongoDB application user password
      MONGO_DB: ${MONGO_DB}                                 # Default MongoDB database name
    ports:
      - "${MONGO_PORT}:27017"                               # Expose MongoDB port to host
    volumes:
      - mongo-data:/data/db                                 # Persist MongoDB data
    networks:
      - app-network
    shm_size: "256m"                                        # Set shared memory size to help with memory constraints
    deploy:
      resources:
        limits:
          memory: 512M                                      # Set a memory limit for the container (swarm mode only)
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 3

  resume-fastapi:
    build:
      context: ..
      dockerfile: build/fastapi.Dockerfile
    container_name: resume-fastapi
    environment:
      MONGO_HOST: ${MONGO_HOST}                           # MongoDB hostname (service name or IP)
      MONGO_PORT: ${MONGO_PORT}                           # MongoDB port (default: 27017)
      MONGO_USER: ${MONGO_USER}                           # MongoDB application user
      MONGO_PASS: ${MONGO_PASS}                           # MongoDB application user password
      MONGO_DB: ${MONGO_DB}                               # MongoDB database name
    ports:
      - "${FASTAPI_PORT}:8000"                           # Expose FastAPI API port to host
    depends_on:
      resume-mongo:
        condition: service_healthy                      # Wait until MongoDB is healthy before starting
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://resume-fastapi:8000/"]
      interval: 5s
      timeout: 3s
      retries: 3

  tests-ci:
    build:
      context: ..
      dockerfile: build/test.Dockerfile
    container_name: tests-ci
    depends_on:
      resume-fastapi:
        condition: service_healthy                      # Ensure FastAPI is healthy before running tests
    networks:
      - app-network
    command: >
      sh -c "ping -c 4 -w 5 resume-fastapi &&
             curl -v http://resume-fastapi:8000/ &&
             ./build/sh_scripts/cicd_run.sh"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://resume-fastapi:8000/resume/status/health"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  mongo-data:                   # Persistent storage for MongoDB data

networks:
  app-network:
    driver: bridge             # Use bridge network for container communication




